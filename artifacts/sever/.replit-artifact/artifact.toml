kind = "web"
previewPath = "/"
title = "Sever — P2P Lending"
version = "1.0.0"
id = "artifacts/sever"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22285

[services.development]
run = "pnpm --filter @workspace/sever run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sever", "run", "build" ]
publicDir = "artifacts/sever/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22285"
BASE_PATH = "/"
